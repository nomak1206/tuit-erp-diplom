name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t erp-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t erp-frontend:latest ./frontend

      - name: Run docker-compose (smoke test)
        run: |
          docker compose up -d
          sleep 15
          curl -f http://localhost:8000/api/health || exit 1
          docker compose down

      # TODO: push to registry and deploy to server
